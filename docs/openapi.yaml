        - 🔑 Auth
      summary: Login
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"email\": \"superadmin@school.com\",\n  \"password\":
                \"Password@123\"\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
