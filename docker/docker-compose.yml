services:
  # ─────────────────────────────────────────────
  # PostgreSQL — primary datastore
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: edu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: edu_management
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_edu:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edu_management"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - edu_net

  # ─────────────────────────────────────────────
  # Go API — multi-stage build
  # ─────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: final
    container_name: edu_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "5000:5000"
    networks:
      - edu_net

volumes:
  postgres_data_edu:
    driver: local

networks:
  edu_net:
    driver: bridge
